<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter — The Besorah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  /* Pin the footer to the bottom of the viewport on short chapters */
  body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
  .chapter-bar { flex: 0 0 auto; }
  .chapter-main { flex: 1 1 auto; }
  .chapter-footer { flex: 0 0 auto; }
</style>
</head>
<body>

<div class="chapter-bar">
  <div class="title">
    <a href="index.html" style="margin-right:0.6rem;">&larr;</a>
    <span class="heb" id="bar-heb">…</span>
    <span class="eng" id="bar-eng"></span>
    <span id="bar-ch" style="margin-left:0.6rem; color: var(--ink-dim);"></span>
  </div>
  <div class="controls">
    <a id="prev" href="#">&larr; Prev</a>
    <a id="book-toc" href="#">Chapters</a>
    <a id="pdf-link" href="#" target="_blank" title="Open original PDF page">PDF</a>
    <a id="next" href="#">Next &rarr;</a>
  </div>
</div>

<main class="chapter-main">
  <div class="chapter-page" id="chapter-page">
    <h1 class="chapter-page-title" id="page-heb"></h1>
    <h2 class="chapter-page-sub" id="page-eng"></h2>
    <div class="chapter-num" id="ch-num"></div>
    <div id="verses" class="verses"></div>
    <p class="note" id="loading">Loading chapter…</p>
  </div>
</main>

<footer class="chapter-footer">
  <div class="controls">
    <a id="prev2" href="#">&larr; Previous chapter</a>
    <a id="next2" href="#">Next chapter &rarr;</a>
  </div>
</footer>

<script>
const params  = new URLSearchParams(location.search);
const bookId  = params.get('id');
const chapter = parseInt(params.get('ch'), 10) || 1;

fetch('assets/index.json')
  .then(r => r.json())
  .then(idx => {
    const book = idx.books.find(b => b.id === bookId);
    if (!book) throw new Error('Book not found');
    return fetch(`assets/text/${book.id}.json`)
      .then(r => r.json())
      .then(text => ({book, text}));
  })
  .then(({book, text}) => {
    const ch = text.chapters[String(chapter)];
    if (!ch) throw new Error('Chapter not found');

    // Header / title
    document.title = `${book.hebrew}${book.chapter_count > 1 ? ' ' + chapter : ''} — The Besorah`;
    document.getElementById('bar-heb').textContent = book.hebrew;
    document.getElementById('bar-eng').textContent = `(${book.english})`;
    if (book.chapter_count > 1) {
      document.getElementById('bar-ch').textContent = `Chapter ${chapter}`;
    }
    document.getElementById('page-heb').textContent = book.hebrew;
    document.getElementById('page-eng').textContent = book.english;
    if (book.chapter_count > 1) {
      document.getElementById('ch-num').textContent = chapter;
    }

    // PDF link (still available for cross-reference)
    document.getElementById('pdf-link').href = `SCRIPTURE/${ch.pdf}#page=${ch.page}`;

    // Prev / Next links
    function setLink(elId, href, disabled) {
      const el = document.getElementById(elId);
      if (!el) return;
      if (disabled) {
        el.classList.add('disabled');
        el.removeAttribute('href');
      } else {
        el.classList.remove('disabled');
        el.href = href;
      }
    }
    const prevHref = chapter > 1 ? `chapter.html?id=${book.id}&ch=${chapter - 1}` : '#';
    const nextHref = chapter < book.chapter_count ? `chapter.html?id=${book.id}&ch=${chapter + 1}` : '#';
    setLink('prev',  prevHref, chapter <= 1);
    setLink('prev2', prevHref, chapter <= 1);
    setLink('next',  nextHref, chapter >= book.chapter_count);
    setLink('next2', nextHref, chapter >= book.chapter_count);
    document.getElementById('book-toc').href = `book.html?id=${book.id}`;

    // Render verses
    const out = document.getElementById('verses');
    out.innerHTML = '';
    const verses = ch.verses || [];
    if (verses.length === 0) {
      out.innerHTML = `<p class="note">No text extracted for this chapter. <a href="SCRIPTURE/${ch.pdf}#page=${ch.page}" target="_blank">Open the PDF page</a>.</p>`;
    } else {
      // Verse text may contain <span class="dn">…</span> for divine names.
      // Escape any other angle brackets and only un-escape that one element.
      function renderVerseText(raw) {
        // Escape everything first
        const esc = raw
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        // Un-escape the divine-name span tag
        return esc.replace(
          /&lt;span class=&quot;dn&quot;&gt;([\s\S]*?)&lt;\/span&gt;/g,
          '<span class="dn">$1</span>'
        );
      }

      // Long-form chapters (Patriarchs, single-verse books) get single-block prose
      const isProse = verses.length === 1 && verses[0].t.length > 600;
      if (isProse) {
        const para = document.createElement('p');
        para.className = 'prose';
        para.innerHTML = renderVerseText(verses[0].t);
        out.appendChild(para);
      } else {
        for (const v of verses) {
          const p = document.createElement('p');
          p.className = 'verse';
          p.innerHTML =
            `<sup class="verse-n">${v.n}</sup> ` + renderVerseText(v.t);
          out.appendChild(p);
        }
      }
    }
    document.getElementById('loading').style.display = 'none';
  })
  .catch(err => {
    console.error(err);
    document.getElementById('loading').textContent =
      'Failed to load chapter. Make sure you opened this site through a local web server (e.g. `python3 -m http.server`).';
  });
</script>
</body>
</html>
